name: Build Android APK (Astro + Capacitor)

on:
  push:
    branches: [ main, master, chore/migrate-to-pnpm ] # Roda automaticamente quando você der push nessas branches
  workflow_dispatch: # Permite que você clique em um botão no GitHub para rodar manualmente quando quiser

  permissions:
    contents: write

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: 1. Baixando o código do repositório
        uses: actions/checkout@v4

      - name: 2. Configurando o Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: 3. Instalando o pnpm na nuvem
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: 4. Instalando as dependências do projeto
        run: |
          cd arca_astro
          pnpm install

      - name: 5. Gerando o Build do Astro (Cria a pasta dist)
        run: |
          cd arca_astro
          pnpm build

      - name: 6. Configurando o Java (Obrigatório para o Android SDK)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21' # Versão ideal e estável para o Capacitor moderno

      - name: 7. Sincronizando o Capacitor (Copia a pasta dist para o Android)
        run: |
          cd arca_astro
          pnpm exec cap sync

      - name: 8. Compilando o APK (Trabalho pesado que travaria seu PC)
        run: |
          cd arca_astro/android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: 9. Disponibilizando o APK para Download
        uses: actions/upload-artifact@v4
        with:
          name: meu-app-android-apk
          path: arca_astro/android/app/build/outputs/apk/debug/app-debug.apk
      
      - name: 10. Criar/Atualizar Release Oficial (Deploy continuo)
        uses: ncipollo/release-action@v1
        with:
          allowUpdates: true # Crucial: Se a release já existir, ele sobrescreve em vez de dar erro.
          tag: "latest-build"
          name: "Build Automático (Desenvolvimento)"
          body: "Este é o último build gerado automaticamente. O arquivo APK está anexado abaixo."
          artifacts: "arca_astro/android/app/build/outputs/apk/debug/app-debug.apk"
          token: ${{ secrets.GITHUB_TOKEN }} # Usa a senha do próprio robô, você não precisa configurar nada.